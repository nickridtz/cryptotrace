services:
  - type: web
    name: cryptotrace
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BLOCKCHAIR_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
